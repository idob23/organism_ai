version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: organism_postgres
    environment:
      POSTGRES_USER: organism
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-organism_secret}
      POSTGRES_DB: organism_ai
    expose:
      - "5432"
    volumes:
      - organism_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organism -d organism_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  sandbox:
    build:
      context: ./sandbox
    image: organism-sandbox
    entrypoint: ["echo", "sandbox image built"]
    restart: "no"

  bot:
    build: .
    container_name: organism_bot
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://organism:${POSTGRES_PASSWORD:-organism_secret}@postgres:5432/organism_ai
    volumes:
      - organism_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M

volumes:
  organism_pgdata:
  organism_data:
