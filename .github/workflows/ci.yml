name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install anthropic tavily-python asyncpg sqlalchemy pgvector aiohttp python-telegram-bot aiogram openai python-pptx numpy httpx pydantic-settings

      - name: Syntax + Cyrillic + Import check
        run: python pre_commit_check.py

      - name: Quick benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python benchmark.py --quick
